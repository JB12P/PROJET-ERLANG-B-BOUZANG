<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Calcul du trafic A (Erlang B)</title>
<style>
    body { font-family: Arial; padding: 20px; }
    table { border-collapse: collapse; margin-top: 15px; }
    th, td { border: 1px solid black; padding: 5px 10px; text-align: center; }
</style>
</head>

<body>

<h2>Calcul du trafic A en fonction de N et Pr (Erlang B)</h2>

<label>Nombre de canaux N :</label>
<input type="number" id="N" value="10"><br><br>

<label>Probabilité max de rejet Pr (%) :</label>
<input type="number" id="Pr" step="1" value="2"><br><br>

<button onclick="calculer()">Calculer</button>

<h3 id="resultat"></h3>

<table>
<thead>
<tr>
<th>A (trafic)</th>
<th>Probabilité de rejet</th>
</tr>
</thead>
<tbody id="tableau"></tbody>
</table>

<script>
// =============================
// Fonction Erlang B
// =============================
function erlangB(N, A) {
    let numerateur = 1;
    for (let i = 1; i <= N; i++) {
        numerateur *= A / i;
    }

    let denominateur = 1;
    let terme = 1;
    for (let k = 1; k <= N; k++) {
        terme *= A / k;
        denominateur += terme;
    }

    return numerateur / denominateur;
}

// =============================
// Programme principal
// =============================
function calculer() {
    let N = parseInt(document.getElementById("N").value);
    let Pr = parseFloat(document.getElementById("Pr").value) / 100;


    let A = 0;
    let Proba = 0;

    let pas = 0.5; // incrément du trafic
    let tableau = document.getElementById("tableau");
    tableau.innerHTML = "";

    do {
        A += pas;
        Proba = erlangB(N, A);

        let ligne = "<tr><td>" + A.toFixed(2) + "</td><td>" + Proba.toFixed(6)*100 + "</td></tr>";
        tableau.innerHTML += ligne;

    } while (Proba <= Pr);

    document.getElementById("resultat").innerText =
        "Trafic maximal supporté ≈ " + (A - pas).toFixed(2) + " Erlangs";
}
</script>

</html>
